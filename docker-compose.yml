version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: grind-protocol-postgres
    environment:
      POSTGRES_DB: grind_protocol
      POSTGRES_USER: grind_protocol
      POSTGRES_PASSWORD: grind_protocol
    ports:
      - "5432:5432"
    volumes:
      - grind_protocol_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grind_protocol"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: grind-protocol-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  grind_protocol_pgdata: