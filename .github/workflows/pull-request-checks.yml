name: pull-request-checks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout grind-protocol
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Checkout security-core
        uses: actions/checkout@v4
        with:
          repository: DayBRR/security-core
          path: security-core

      - name: Install security-core locally
        working-directory: security-core
        run: mvn clean install -DskipTests

      - name: Verify grind-protocol
        run: mvn clean verify