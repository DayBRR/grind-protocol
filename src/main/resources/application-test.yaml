spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    show-sql: false

  sql:
    init:
      mode: always

  flyway:
    enabled: false

  h2:
    console:
      enabled: false

security:
  rate-limit:
    login:
      enabled: false
    refresh:
      enabled: false
  jwt:
    issuer: grind-protocol-test
    expiration: 900000
    secret-key: kiZBXT4bphjoTdPrxGFYSzdvYxK0yaQ8tu/RhTZ+pvo=